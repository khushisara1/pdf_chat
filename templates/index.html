<!DOCTYPE html>
<html>
<head>
    <title>Chat with PDF</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 40px auto; padding: 20px; }
        #chat-box { height: 400px; overflow-y: auto; border: 1px solid #ccc; padding: 15px; margin: 20px 0; border-radius: 8px; }
        .user-msg { background: #007bff; color: white; padding: 8px 12px; border-radius: 8px; margin: 5px 0; text-align: right; }
        .ai-msg { background: #f1f1f1; padding: 8px 12px; border-radius: 8px; margin: 5px 0; }
        input[type="text"] { width: 75%; padding: 10px; border-radius: 8px; border: 1px solid #ccc; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>📄 Chat with your PDF</h1>

    <input type="file" id="pdf-input" accept=".pdf">
    <button onclick="uploadPDF()">Upload PDF</button>
    <p id="upload-status"></p>

    <div id="chat-box"></div>

    <input type="text" id="question" placeholder="Ask something about your PDF...">
    <button onclick="askQuestion()">Ask</button>

    <script>
        async function uploadPDF() {
            const file = document.getElementById("pdf-input").files[0];
            const formData = new FormData();
            formData.append("pdf", file);

            const res = await fetch("/upload", { method: "POST", body: formData });
            const data = await res.json();
            document.getElementById("upload-status").innerText = data.message;
        }

        async function askQuestion() {
            const question = document.getElementById("question").value;
            if (!question) return;

            addMessage(question, "user");
            document.getElementById("question").value = "";

            const res = await fetch("/ask", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ question })
            });
            const data = await res.json();
            addMessage(data.answer, "ai");
        }

        function addMessage(text, sender) {
            const box = document.getElementById("chat-box");
            const div = document.createElement("div");
            div.className = sender === "user" ? "user-msg" : "ai-msg";
            div.innerText = text;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }

        document.getElementById("question").addEventListener("keypress", function(e) {
            if (e.key === "Enter") askQuestion();
        });
    </script>
</body>
</html>
